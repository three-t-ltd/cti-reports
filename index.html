<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社CTI 活動報告アーカイブ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background: #f0f4f8; color: #2d3748; line-height: 1.8; min-height: 100vh; display: flex; flex-direction: column; }
        .hero { background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 50%, #3182ce 100%); color: white; text-align: center; padding: 60px 20px 50px; }
        .hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .hero p { font-size: 1rem; opacity: 0.85; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; flex: 1; }
        .report-card { background: white; border-radius: 14px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; transition: box-shadow 0.2s, transform 0.2s; }
        .report-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .report-info h3 { font-size: 1.2rem; font-weight: 700; color: #1a365d; margin-bottom: 4px; }
        .report-info p { font-size: 0.9rem; color: #718096; }
        .badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
        .badge.lock { background: #bee3f8; color: #2a4365; }
        .badge.external { background: #feebc8; color: #7b341e; }
        .arrow { font-size: 1.4rem; color: #a0aec0; }
        footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #a0aec0; }
        @media (max-width: 600px) { .hero h1 { font-size: 1.6rem; } .report-card { flex-direction: column; align-items: flex-start; gap: 12px; } }
    </style>
</head>
<body>
<div class="hero">
    <h1>🏢 株式会社CTI</h1>
    <p>活動報告アーカイブ</p>
</div>
<div class="container">
    <a class="report-card" href="./2026-05/">
        <div class="report-info">
            <h3>2026年5月度 活動報告サマリー</h3>
            <p>渡邊さん内定（7/21入社）・サジェスト対策完了とブランディング基盤の前進</p>
            <span class="badge lock">🔒 パスワード保護</span>
        </div>
        <span class="arrow">→</span>
    </a>
    <a class="report-card" href="./2026-04/">
        <div class="report-info">
            <h3>2026年4月度 活動報告サマリー</h3>
            <p>採用成果の獲得とLIB事業ブランディング戦略の確立</p>
            <span class="badge lock">🔒 パスワード保護</span>
        </div>
        <span class="arrow">→</span>
    </a>
    <a class="report-card" href="./2026-03/">
        <div class="report-info">
            <h3>2026年3月度 活動報告サマリー</h3>
            <p>基盤整備の月 — HP更新完了・Instagram安定運用</p>
            <span class="badge lock">🔒 パスワード保護</span>
        </div>
        <span class="arrow">→</span>
    </a>
    <a class="report-card" href="https://pvzfjzkb.gensparkspace.com" target="_blank" rel="noopener">
        <div class="report-info">
            <h3>2026年2月度 活動報告サマリー</h3>
            <p>採用広告の成果と社内体制の整備</p>
            <span class="badge external">🔗 外部リンク（パスワード必要）</span>
        </div>
        <span class="arrow">→</span>
    </a>
</div>
<footer>Powered by three.T合同会社</footer>
</body>
</html>
